<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Datafork — CSV Validator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
  --bg:#F7F8F7; --surface:#FFFFFF; --surface-2:#F1F3F2; --border:#E3E6E4; --border-2:#D2D6D3;
  --slate:#0F1A24; --slate-2:#1A2733; --slate-3:#2A3742; --on-slate:#E8EDEA; --on-slate-2:#9DA9A3;
  --text-1:#0F1A24; --text-2:#5F6E78; --text-3:#94A09A;
  --accent:#1D9E75; --accent-2:#178563; --accent-bg:#E1F5EE; --accent-text:#0F6E56;
  --success:#639922; --success-bg:#EAF3DE; --warning:#BA7517; --warning-bg:#FAEEDA;
  --danger:#C2603A; --danger-bg:#FAECE7;
  --radius:8px; --radius-lg:12px; --radius-sm:6px;
  --shadow-sm:0 1px 2px rgba(15,26,36,0.04); --shadow:0 2px 8px rgba(15,26,36,0.06); --shadow-lg:0 8px 24px rgba(15,26,36,0.08);
  /* compatibility aliases (old token names -> new system) */
  --border-h:#D2D6D3; --accent-dim:#178563; --accent-dark:#178563; --accent-light:#E1F5EE; --on-accent:#FFFFFF;
  --nav-bg:rgba(247,248,247,0.9); --row-alt:#F1F3F2; --dot:#E3E6E4;
  /* refined dark terminal output block (kept dark for code/output only) */
  --term-bg:#0F1A24; --term-green:#1D9E75; --term-chrome:#1A2733; --term-chrome-border:#2A3742;
  --term-text:#E8EDEA; --term-prompt:#9DA9A3; --term-muted:#9DA9A3; --term-tab:#9DA9A3;
  --tl-r:#E0867A; --tl-y:#D9B65A; --tl-g:#7FB069; --cta-sub:rgba(255,255,255,0.6);
}
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--surface); color:var(--text-1); font-family:'Inter',system-ui,sans-serif;
      min-height:100vh; display:flex; flex-direction:column;
      background-image:radial-gradient(circle,var(--dot) 1px,transparent 1px); background-size:24px 24px;
      -webkit-font-smoothing:antialiased; }
    a { color:inherit; text-decoration:none; }
    .mono { font-family:'Inter',system-ui,sans-serif; }

    .app-header { display:flex; align-items:center; justify-content:space-between;
      padding:18px 24px; background:var(--bg); border-bottom:1px solid var(--border); }
    .logo { font-family:'Inter',system-ui,sans-serif; font-weight:600; font-size:14px; color:var(--text-1); }
    .logo .dot { color:var(--accent); }
    .app-nav a { font-family:'Inter',system-ui,sans-serif; font-size:12px; color:var(--text-2); transition:color .15s; }
    .app-nav a:hover { color:var(--accent); }

    .page { flex:1; width:100%; max-width:720px; margin:0 auto; padding:48px 24px; }
    .eyebrow { font-family:'Inter',system-ui,sans-serif; font-size:11px; color:var(--accent);
      text-transform:uppercase; letter-spacing:.12em; }
    h1 { font-weight:700; font-size:2.2rem; letter-spacing:-.01em; margin:12px 0 10px; }
    .subline { font-size:15px; color:var(--text-2); max-width:560px; margin-bottom:28px; }

    /* platform pills */
    .pill-label { font-family:'Inter',system-ui,sans-serif; font-size:11px; color:var(--text-3);
      text-transform:uppercase; letter-spacing:.08em; margin-bottom:8px; display:block; }
    .pill-row { display:flex; gap:8px; margin-bottom:22px; }
    .pill { font-family:'Inter',system-ui,sans-serif; font-size:12px; border:1px solid var(--border);
      background:var(--bg); color:var(--text-2); padding:6px 16px; border-radius:var(--radius);
      cursor:pointer; transition:background .14s,color .14s,border-color .14s; }
    .pill:hover { color:var(--text-1); border-color:var(--border-h); }
    .pill.active { background:var(--accent); color:#fff; border-color:var(--accent); font-weight:600; }

    /* drop zone */
    .drop { border:2px dashed var(--border); border-radius:var(--radius-lg); padding:48px 32px;
      text-align:center; background:var(--surface); cursor:pointer;
      transition:border-color .2s,background .2s; }
    .drop.dragover { border-color:var(--accent); background:var(--accent-light); }
    .drop.has-file { border-color:var(--accent); background:var(--accent-light); }
    .drop-icon { font-family:'Inter',system-ui,sans-serif; font-size:1.6rem; color:var(--text-3); margin-bottom:12px; }
    .drop-text { font-size:15px; color:var(--text-2); }
    .drop-sub { font-family:'Inter',system-ui,sans-serif; font-size:11px; color:var(--text-3); margin-top:6px; }
    .drop-file { font-family:'Inter',system-ui,sans-serif; font-size:13px; color:var(--accent); }

    .btn-main { width:100%; background:var(--accent); color:#fff; font-family:'Inter',system-ui,sans-serif;
      font-size:14px; font-weight:600; padding:14px; border:none; border-radius:var(--radius);
      letter-spacing:.04em; cursor:pointer; transition:background .15s,color .15s; margin-top:18px; }
    .btn-main:hover:not(:disabled) { background:var(--accent-dark); color:#fff; }
    .btn-main:disabled { opacity:.4; cursor:not-allowed; }
    .btn-ghost { width:100%; background:transparent; border:1px solid var(--border); color:var(--text-2);
      font-family:'Inter',system-ui,sans-serif; font-size:13px; padding:12px; border-radius:var(--radius);
      cursor:pointer; margin-top:12px; transition:border-color .15s,color .15s; }
    .btn-ghost:hover { color:var(--text-1); border-color:var(--border-h); }

    .hidden { display:none; }

    /* results */
    .results { margin-top:28px; animation:fade .3s ease; }
    @keyframes fade { from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;} }
    .summary-card { border-radius:var(--radius-lg); padding:16px 20px; margin-bottom:18px;
      font-family:'Inter',system-ui,sans-serif; font-size:13px; }
    .summary-card.ok { background:var(--accent-light); border:1px solid var(--accent); color:var(--accent); }
    .summary-card.bad { background:rgba(194,96,58,0.06); border:1px solid rgba(194,96,58,0.25); color:var(--danger); }

    .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:22px; }
    .stat { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; text-align:center; }
    .stat-num { font-family:'Inter',system-ui,sans-serif; font-weight:700; font-size:24px; color:var(--text-1); }
    .stat-lbl { font-family:'Inter',system-ui,sans-serif; font-size:11px; color:var(--text-3); text-transform:uppercase; letter-spacing:.06em; margin-top:2px; }

    .sec-label { font-family:'Inter',system-ui,sans-serif; font-size:11px; color:var(--text-3);
      text-transform:uppercase; letter-spacing:.08em; margin:18px 0 8px; }
    .issue { border-radius:var(--radius); padding:10px 14px; margin-bottom:6px; display:flex;
      align-items:center; gap:10px; font-family:'Inter',system-ui,sans-serif; font-size:12px; }
    .issue.err { background:rgba(194,96,58,0.06); border-left:3px solid var(--danger); color:var(--danger); }
    .issue.warn { background:rgba(186,117,23,0.06); border-left:3px solid rgba(186,117,23,0.3); color:var(--warning); }
    .issue .msg { flex:1; }
    .row-badge { font-family:'Inter',system-ui,sans-serif; font-size:10px; background:rgba(194,96,58,0.12); color:var(--danger);
      padding:2px 8px; border-radius:var(--radius); white-space:nowrap; }
    .issue.warn .row-badge { background:rgba(186,117,23,0.10); color:var(--warning); }

    .passed-toggle { font-family:'Inter',system-ui,sans-serif; font-size:12px; color:var(--text-2);
      cursor:pointer; margin-top:18px; user-select:none; }
    .passed-toggle:hover { color:var(--text-1); }
    .passed-list { margin-top:8px; }
    .passed-item { font-family:'Inter',system-ui,sans-serif; font-size:12px; color:var(--text-3); padding:3px 0; }
    .passed-item::before { content:"✓ "; color:var(--accent); }

    .foot { text-align:center; padding:24px; color:var(--text-3); font-family:'Inter',system-ui,sans-serif;
      font-size:11px; letter-spacing:.12em; }

    @media (max-width:560px){ .stats{ grid-template-columns:1fr 1fr; } }
  
    /* ── Calm Confidence base ── */
    h1, h2, h3, h4, h5, .card-title, .done-title, .err-title, .cc-name,
    .legal-header h1, .hero h1, .hero-h1, .sec-head h2, .final-cta h2 {
      font-family: 'Inter Tight', 'Inter', sans-serif; font-weight: 600; letter-spacing: -0.01em;
    }
    .mono, code, .log, .bar, .cc-term, .dash-tab, .term-tab, .term-body, .price .amt {
      font-family: 'JetBrains Mono', monospace;
    }
  </style>
</head>
<body>
  <header class="app-header">
    <a class="logo" href="/"><span style="color:var(--text-1)">data</span><span style="color:var(--accent)">fork.</span></a>
    <nav class="app-nav"><a href="/">← Back to app</a></nav>
  </header>

  <main class="page">
    <span class="eyebrow">CSV VALIDATOR</span>
    <h1>Validate Before You Import.</h1>
    <p class="subline">Upload your WooCommerce or Shopify CSV. Get a full error report before the import breaks.</p>

    <div id="form-area">
      <span class="pill-label">Platform</span>
      <div class="pill-row" id="platform-row">
        <button type="button" class="pill active" data-platform="woocommerce">WooCommerce</button>
        <button type="button" class="pill" data-platform="shopify">Shopify</button>
      </div>

      <div class="drop" id="drop">
        <div class="drop-icon">CSV</div>
        <div class="drop-text" id="drop-text">Drop your CSV here or click to browse</div>
        <div class="drop-sub">Max 5MB · WooCommerce or Shopify format</div>
        <input type="file" id="file-input" accept=".csv" class="hidden">
      </div>

      <button type="button" class="btn-main" id="btn-validate" disabled>Validate CSV</button>
    </div>

    <div id="results" class="results hidden"></div>
  </main>

  <footer class="foot">Datafork — CSV VALIDATOR</footer>

  <script>
    let selectedPlatform = "woocommerce";
    let selectedFile = null;

    const $ = id => document.getElementById(id);

    // platform toggle
    document.querySelectorAll('#platform-row .pill').forEach(p => {
      p.addEventListener('click', () => {
        document.querySelectorAll('#platform-row .pill').forEach(x => x.classList.remove('active'));
        p.classList.add('active');
        selectedPlatform = p.dataset.platform;
      });
    });

    // drop zone
    const drop = $('drop'), fileInput = $('file-input');
    drop.addEventListener('click', () => fileInput.click());
    drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('dragover'); });
    drop.addEventListener('dragleave', () => drop.classList.remove('dragover'));
    drop.addEventListener('drop', e => {
      e.preventDefault(); drop.classList.remove('dragover');
      if (e.dataTransfer.files.length) setFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', () => { if (fileInput.files.length) setFile(fileInput.files[0]); });

    function setFile(file) {
      if (!file.name.toLowerCase().endsWith('.csv')) { alert('Please select a .csv file.'); return; }
      selectedFile = file;
      drop.classList.add('has-file');
      const kb = (file.size / 1024).toFixed(1);
      $('drop-text').innerHTML = '<span class="drop-file">' + file.name + ' · ' + kb + ' KB</span>';
      $('btn-validate').disabled = false;
    }

    // validate
    $('btn-validate').addEventListener('click', async () => {
      if (!selectedFile) return;
      const btn = $('btn-validate');
      btn.disabled = true; btn.textContent = 'Validating…';
      const fd = new FormData();
      fd.append('file', selectedFile);
      fd.append('platform', selectedPlatform);
      try {
        const res = await fetch('/api/validator/check', { method:'POST', body:fd });
        const json = await res.json();
        if (!res.ok || json.error) { renderError(json.message || 'Validation failed.'); return; }
        renderResults(json);
      } catch (e) {
        renderError('Network error. Please try again.');
      } finally {
        btn.disabled = false; btn.textContent = 'VALIDATE CSV';
      }
    });

    function esc(s){ return (s+'').replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

    function renderResults(r) {
      $('form-area').classList.add('hidden');
      const out = $('results');
      let html = '';

      if (r.valid) {
        html += '<div class="summary-card ok">✓ Valid CSV — ready to import</div>';
      } else {
        html += '<div class="summary-card bad">✗ ' + r.errors.length + ' errors found — fix before importing</div>';
      }

      const s = r.stats || {};
      html += '<div class="stats">' +
        statCard(s.total_rows, 'Total rows') + statCard(s.products, 'Products') +
        statCard(s.variations, 'Variations') + statCard(s.simple, 'Simple') + '</div>';

      if (r.errors && r.errors.length) {
        html += '<div class="sec-label">Errors</div>';
        r.errors.forEach(e => { html += issue('err', '✗', e); });
      }
      if (r.warnings && r.warnings.length) {
        html += '<div class="sec-label">Warnings</div>';
        r.warnings.forEach(w => { html += issue('warn', '⚠', w); });
      }
      if (r.passed && r.passed.length) {
        html += '<div class="passed-toggle" id="passed-toggle">▶ ' + r.passed.length + ' checks passed</div>';
        html += '<div class="passed-list hidden" id="passed-list">' +
          r.passed.map(p => '<div class="passed-item">' + esc(p) + '</div>').join('') + '</div>';
      }
      html += '<button type="button" class="btn-ghost" id="btn-another">Validate another</button>';

      out.innerHTML = html;
      out.classList.remove('hidden');

      const pt = $('passed-toggle');
      if (pt) pt.addEventListener('click', () => {
        const list = $('passed-list'); const open = !list.classList.contains('hidden');
        list.classList.toggle('hidden');
        pt.textContent = (open ? '▶ ' : '▼ ') + r.passed.length + ' checks passed';
      });
      $('btn-another').addEventListener('click', resetForm);
    }

    function statCard(n, lbl){ return '<div class="stat"><div class="stat-num">' + (n ?? 0) + '</div><div class="stat-lbl">' + lbl + '</div></div>'; }
    function issue(kind, icon, it){
      const badge = (it.row != null) ? '<span class="row-badge">ROW ' + it.row + '</span>' : '';
      return '<div class="issue ' + kind + '"><span class="msg">' + icon + ' ' + esc(it.message) + '</span>' + badge + '</div>';
    }
    function renderError(msg){
      $('form-area').classList.add('hidden');
      const out = $('results');
      out.innerHTML = '<div class="summary-card bad">✗ ' + esc(msg) + '</div>' +
        '<button type="button" class="btn-ghost" id="btn-another">Try again</button>';
      out.classList.remove('hidden');
      $('btn-another').addEventListener('click', resetForm);
    }
    function resetForm(){
      selectedFile = null; fileInput.value = '';
      drop.classList.remove('has-file');
      $('drop-text').textContent = 'Drop your CSV here or click to browse';
      $('btn-validate').disabled = true;
      $('results').classList.add('hidden'); $('results').innerHTML = '';
      $('form-area').classList.remove('hidden');
    }
  </script>
</body>
</html>
